<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paper & Ink: Japan | The Spatial Journey</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP (Scrollytelling) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Three.js (WebGL 3D) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-washi: #f2eee5;
            --bg-card: #fbfaf6;
            --ink-main: #36312d;
            --ink-muted: #7a7269;
            --accent-matcha: #6b7a60;
            --accent-clay: #b56a5c;
            --border-earth: #d6cfc3;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Handled dynamically */
            background-color: var(--bg-washi);
            color: var(--ink-main);
            font-family: 'Noto Sans JP', sans-serif;
            overscroll-behavior: none; /* Prevent bounce */
        }

        .font-serif { font-family: 'Bodoni Moda', serif; }

        /* Washi Texture Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* --- 1. SPATIAL DESK VIEW --- */
        #desk-viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            cursor: grab;
            z-index: 10;
        }
        #desk-viewport:active { cursor: grabbing; }
        
        #desk-canvas {
            position: absolute;
            top: -50vh; left: -50vw;
            width: 200vw; height: 200vh;
            background: radial-gradient(circle at center, var(--bg-washi) 0%, #e6e0d4 100%);
            will-change: transform;
        }

        /* Ink Background Canvas */
        #ink-bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.15;
        }

        /* Artifacts on Desk */
        .artifact {
            position: absolute;
            width: 300px;
            height: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border-earth);
            box-shadow: 0 10px 40px rgba(54, 49, 45, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 2rem;
            transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
            transform-origin: center;
        }
        .artifact:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 20px 50px rgba(181, 106, 92, 0.15);
            border-color: var(--accent-clay);
        }
        .artifact-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--ink-main);
            margin-bottom: 0.5rem;
        }
        .artifact-subtitle {
            font-size: 0.85rem;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .three-container {
            width: 100%;
            height: 200px;
            position: absolute;
            top: 20px;
        }

        /* Placement on virtual desk */
        #art-philosophy { top: 20%; left: 20%; transform: rotate(-5deg); }
        #art-philosophy:hover { transform: scale(1.05) translateY(-10px) rotate(-2deg); }
        
        #art-origami { top: 40%; left: 50%; transform: translateX(-50%) rotate(2deg); }
        #art-origami:hover { transform: translateX(-50%) scale(1.05) translateY(-10px) rotate(0deg); }
        
        #art-shodo { top: 30%; right: 20%; transform: rotate(4deg); }
        #art-shodo:hover { transform: scale(1.05) translateY(-10px) rotate(1deg); }

        /* --- 2. GAMIFIED TRANSITION (Paint to Reveal) --- */
        #wipe-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: transparent;
            z-index: 50;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #wipe-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #wipe-instruction {
            position: relative;
            color: var(--bg-washi);
            font-family: 'Bodoni Moda', serif;
            font-size: 2rem;
            font-style: italic;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* --- 3. SCROLLYTELLING ARTICLE VIEW --- */
        #article-viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 20;
            background: var(--bg-washi);
            display: none;
            opacity: 0;
        }

        /* The MA effect class */
        .ma-effect {
            transition: opacity 1.5s ease-in-out;
        }
        .is-idle .ma-effect {
            opacity: 0.1 !important; /* Fades out text when idle */
        }

        /* Article Layout */
        .story-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding: 4rem 10vw;
        }
        .story-text {
            width: 50%;
            padding-right: 4rem;
            position: relative;
            z-index: 2;
        }
        .story-visual {
            width: 50%;
            height: 100vh;
            position: absolute;
            right: 0;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .story-visual svg {
            width: 80%;
            height: 80%;
            max-height: 600px;
            color: var(--ink-main);
        }

        /* Ink Guide Line */
        #scrolly-guide {
            position: fixed;
            left: 5vw;
            top: 0;
            width: 4px;
            height: 100vh;
            z-index: 1;
        }
        .guide-path {
            stroke: var(--ink-muted);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            opacity: 0.3;
        }

        /* Close Button */
        .close-btn {
            position: fixed;
            top: 2rem; right: 2rem;
            z-index: 30;
            background: none;
            border: none;
            font-family: 'Noto Sans JP', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .close-btn::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 1px;
            background: var(--accent-clay);
            transition: width 0.3s;
        }
        .close-btn:hover::after { width: 100%; }

        /* Typography */
        h1 { font-size: 5rem; line-height: 1; margin-bottom: 2rem; color: var(--ink-main); }
        h2 { font-size: 3rem; margin-bottom: 1.5rem; color: var(--ink-main); }
        p { font-size: 1.1rem; line-height: 2; margin-bottom: 1.5rem; color: var(--ink-muted); }
        strong { color: var(--ink-main); font-weight: 500; }

        /* Desktop vs Mobile adjustments */
        @media (max-width: 768px) {
            .story-section { flex-direction: column; padding: 4rem 5vw; }
            .story-text { width: 100%; padding-right: 0; margin-bottom: 2rem; }
            .story-visual { width: 100%; position: relative; height: 50vh; }
            h1 { font-size: 3rem; }
            .artifact { width: 260px; height: 350px; }
            #art-origami { top: 35%; }
        }
    </style>
</head>
<body>

    <!-- 1. SPATIAL DESK (Overworld) -->
    <div id="desk-viewport">
        <div id="desk-canvas">
            <!-- Liquid Ink Background -->
            <canvas id="ink-bg-canvas"></canvas>
            
            <!-- Draggable Artifacts -->
            <div class="artifact" id="art-philosophy" onclick="triggerTransition('philosophy')">
                <div class="w-full h-48 flex items-center justify-center mb-4 text-[var(--accent-matcha)]">
                    <svg viewBox="0 0 100 100" width="120" height="120" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="50" cy="50" r="40" stroke-dasharray="4 4" opacity="0.5"/>
                        <circle cx="50" cy="50" r="35"/>
                        <path d="M30 50 Q 50 30 70 50" stroke="var(--accent-clay)"/>
                    </svg>
                </div>
                <div class="artifact-title">Ma & Wabi-Sabi</div>
                <div class="artifact-subtitle">The Void & Imperfection</div>
            </div>

            <div class="artifact" id="art-origami" onclick="triggerTransition('origami')">
                <!-- 3D WebGL Container -->
                <div class="three-container" id="three-crane"></div>
                <div class="artifact-title">Origami</div>
                <div class="artifact-subtitle">The Geometry of Fold</div>
            </div>

            <div class="artifact" id="art-shodo" onclick="triggerTransition('shodo')">
                <div class="w-full h-48 flex items-center justify-center mb-4 text-[var(--ink-main)]">
                    <svg viewBox="0 0 100 100" width="120" height="120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                        <path d="M20 70 Q 50 20 80 80 T 50 50" opacity="0.2" stroke-width="10"/>
                        <path d="M30 40 L 70 60 M 50 20 L 50 80" stroke="var(--accent-clay)"/>
                    </svg>
                </div>
                <div class="artifact-title">Shodo</div>
                <div class="artifact-subtitle">The Way of the Brush</div>
            </div>
            
            <!-- Desk Instructions -->
            <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 text-center pointer-events-none opacity-50">
                <p class="font-serif italic text-xl text-[var(--ink-main)] mb-2">Drag to explore the desk</p>
                <svg class="w-6 h-6 mx-auto animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4"></path></svg>
            </div>
        </div>
    </div>

    <!-- 2. TRANSITION CANVAS (Paint to Reveal) -->
    <div id="wipe-overlay">
        <canvas id="wipe-canvas"></canvas>
        <div id="wipe-instruction">Swipe to reveal</div>
    </div>

    <!-- 3. SCROLLYTELLING ARTICLE (Deep Dive) -->
    <div id="article-viewport">
        <button class="close-btn" onclick="returnToDesk()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Return to Desk
        </button>
        
        <!-- Ink Scrolly Line -->
        <svg id="scrolly-guide" viewBox="0 0 10 1000" preserveAspectRatio="none">
            <path class="guide-path" d="M 5 0 Q 8 250 2 500 T 5 1000"/>
        </svg>

        <!-- Content injected here via JS -->
        <div id="article-content"></div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // ==========================================
        // DATA: Content & SVG Generation
        // ==========================================
        const articleData = {
            philosophy: [
                {
                    title: "An Emptiness Full of Possibility",
                    text: "<p>The Japanese concept of <strong>Ma (間)</strong> translates to 'gap,' 'space,' 'pause,' or 'interval.' Etymologically, the ancient Chinese character originally combined the radical for 'door' with 'moon,' depicting the poetic image of moonlight peeping through the crevice of a doorway.</p><p>Unlike Western traditions that often rush to fill empty space, <em>Ma</em> treats negative space as an active, vital component that gives shape and meaning to the whole.</p>",
                    svg: `<svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="2"><circle cx="100" cy="100" r="80" stroke-dasharray="4 8" opacity="0.3"/><circle cx="100" cy="100" r="70" fill="var(--matcha-tint)"/><path class="anim-path" d="M100 20 L 100 180" stroke="var(--accent-clay)" stroke-dasharray="200" stroke-dashoffset="200"/></svg>`
                },
                {
                    title: "Wabi-Sabi: Imperfect Beauty",
                    text: "<p>While <em>Ma</em> governs space and time, <strong>Wabi-Sabi</strong> governs materiality and existence. It is a philosophical appreciation of things that are imperfect, impermanent, and incomplete.</p><p>The aesthetic was perfected in the tea ceremony. Masters rejected opulent imports in favor of rustic, earthy, and asymmetrical Japanese bowls (chawan), transforming tea preparation into an act of profound humility.</p>",
                    svg: `<svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"><path d="M50 80 C 50 140 80 160 100 160 C 120 160 150 140 150 80 Z" fill="var(--bg-card)"/><ellipse cx="100" cy="80" rx="50" ry="15" fill="var(--matcha-tint)"/><path class="anim-path" d="M70 90 L 85 120 L 75 140 M 85 120 L 110 130 L 120 155" stroke="var(--accent-clay)" stroke-width="4" stroke-dasharray="150" stroke-dashoffset="150"/></svg>`
                },
                {
                    title: "The Art of Slow Living",
                    text: "<p>In today's fast-paced world, these philosophies offer a psychological antidote. By decorating with natural materials and embracing empty space, we reduce visual clutter, which lowers stress and regulates the nervous system.</p><p>It teaches the three fundamental truths of nature: nothing is perfect, nothing is finished, and nothing is forever.</p>",
                    svg: `<svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="2"><circle cx="100" cy="100" r="50" fill="var(--clay-tint)"/><path class="anim-path" d="M60 140 C 40 110 80 80 100 100" stroke-linecap="round" stroke-dasharray="100" stroke-dashoffset="100"/><path class="anim-path" d="M140 140 C 160 110 120 80 100 100" stroke-linecap="round" stroke-dasharray="100" stroke-dashoffset="100"/></svg>`
                }
            ],
            shodo: [
                {
                    title: "How It All Began",
                    text: "<p>Japanese calligraphy, or <strong>Shodo</strong>, translates to 'the way of writing.' Introduced from China around the 6th century, early practitioners adhered strictly to rigid, architectural styles.</p><p>During the Heian period, Japan developed its own alphabet (kana), allowing for a much softer, more fluid, and emotionally expressive script known as the <strong>Wayō</strong> style. The brush began to dance.</p>",
                    svg: `<svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="15" stroke-linecap="round"><path class="anim-path" d="M50 100 Q 100 50 150 100 T 150 150" stroke-dasharray="300" stroke-dashoffset="300"/><circle cx="160" cy="80" r="20" fill="var(--accent-clay)" stroke="none" opacity="0.8"/></svg>`
                },
                {
                    title: "Extensions of the Body",
                    text: "<p>To practice Shodo, an artist relies on the <strong>Four Treasures of the Study</strong>: the brush, the ink, the inkstone, and the paper.</p><p>The slow, rhythmic grinding of the solid ink stick on the stone is a deeply meditative ritual that calms the mind before writing. The posture is completely vertical, using the power of the core rather than just the wrist.</p>",
                    svg: `<svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="2"><rect x="50" y="50" width="100" height="120" rx="5" fill="var(--bg-card)"/><path class="anim-path" d="M180 20 L 150 160" stroke-width="8" stroke-linecap="round" stroke-dasharray="200" stroke-dashoffset="200"/><path d="M149 160 C 130 170 150 190 155 190 C 160 190 160 170 151 160 Z" fill="currentColor" stroke="none"/></svg>`
                },
                {
                    title: "A Record of the Spirit",
                    text: "<p>There is a famous saying: <em>'Sho wa hito nari,'</em> meaning 'handwriting is a mirror of the self.' Because dark ink on thin washi paper cannot ever be erased, every stroke is a permanent record of the artist's mental state at that exact fraction of a second.</p><p>To achieve true mastery, one must enter <strong>Mushin</strong> (no-mind)—allowing the brush to move naturally and without hesitation.</p>",
                    svg: `<svg viewBox="0 0 200 200" fill="none" stroke="currentColor"><circle cx="100" cy="100" r="70" fill="var(--matcha-tint)" stroke="none"/><path class="anim-path" d="M60 40 Q 80 30 100 60 Q 120 120 100 180" stroke-width="20" stroke-linecap="round" stroke-dasharray="200" stroke-dashoffset="200"/><path d="M102 140 Q 105 160 105 185" stroke-width="4" stroke-linecap="round"/></svg>`
                }
            ],
            origami: [
                {
                    title: "A Paper History",
                    text: "<p>The word <strong>Origami</strong> comes from <em>oru</em> (to fold) and <em>kami</em> (paper). Originally, paper was so expensive that folding was reserved strictly for the elite and Shinto religious rituals.</p><p>The father of modern origami, Akira Yoshizawa, elevated it to a fine art. He pioneered 'wet-folding'—dampening thick paper to create soft curves and lifelike, sculptural models.</p>",
                    svg: `<svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"><polygon points="100,50 160,90 100,150 40,90" fill="var(--matcha-tint)"/><path class="anim-path" d="M100 50 L 100 150 M 40 90 L 160 90" stroke-dasharray="200" stroke-dashoffset="200"/></svg>`
                },
                {
                    title: "Folding by the Numbers",
                    text: "<p>Modern origami is deeply tied to complex mathematics. The <em>Huzita-Justin axioms</em> define the exact geometry of folding, allowing paper folders to solve algebra problems impossible with a classic compass and ruler.</p><p>Today, NASA uses origami principles to fold massive solar panels and space telescopes so they fit inside rockets, blooming only once they reach zero gravity.</p>",
                    svg: `<svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"><g class="anim-path" stroke-dasharray="300" stroke-dashoffset="300"><polygon points="100,70 120,90 100,110 80,90"/><polygon points="120,50 140,70 120,90 100,70"/><polygon points="100,110 120,130 100,150 80,130"/></g></svg>`
                },
                {
                    title: "The Legend of 1,000 Cranes",
                    text: "<p>In Japanese folklore, the crane is a mystical creature that lives for a thousand years. Folding 1,000 paper cranes (<em>senbazuru</em>) is believed to grant a single wish.</p><p>This was immortalized by Sadako Sasaki, a young girl who folded cranes hoping to recover from radiation sickness after Hiroshima. Today, the crane remains the ultimate global symbol of healing, hope, and peace.</p>",
                    svg: `<svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"><circle cx="100" cy="100" r="50" fill="var(--clay-tint)" stroke="none"/><path class="anim-path" d="M100 80 L 50 40 L 90 110 L 150 40 Z" fill="var(--bg-card)" stroke-dasharray="300" stroke-dashoffset="300"/><polygon points="100,80 90,110 150,150 110,110" fill="var(--accent-matcha)" stroke="none"/></svg>`
                }
            ]
        };

        // ==========================================
        // 1. SPATIAL DESK (Dragging Logic)
        // ==========================================
        const deskViewport = document.getElementById('desk-viewport');
        const deskCanvas = document.getElementById('desk-canvas');
        let isDragging = false;
        let startX, startY;
        let translateX = 0, translateY = 0;
        
        // Center the desk initially
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        gsap.set(deskCanvas, { x: 0, y: 0 });

        deskViewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            // Calculate boundaries so they don't drag off the edge completely
            let newX = e.clientX - startX;
            let newY = e.clientY - startY;
            const boundX = window.innerWidth * 0.4;
            const boundY = window.innerHeight * 0.4;
            
            translateX = Math.max(-boundX, Math.min(boundX, newX));
            translateY = Math.max(-boundY, Math.min(boundY, newY));
            
            gsap.to(deskCanvas, { x: translateX, y: translateY, duration: 0.5, ease: "power2.out" });
        });

        // Touch support
        deskViewport.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
        });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let newX = e.touches[0].clientX - startX;
            let newY = e.touches[0].clientY - startY;
            const boundX = window.innerWidth * 0.4;
            const boundY = window.innerHeight * 0.4;
            translateX = Math.max(-boundX, Math.min(boundX, newX));
            translateY = Math.max(-boundY, Math.min(boundY, newY));
            gsap.to(deskCanvas, { x: translateX, y: translateY, duration: 0.5, ease: "power2.out" });
        });

        // ==========================================
        // 2. INTERACTIVE WEBGL & 3D ELEMENTS
        // ==========================================
        
        // A. Liquid Ink Background (Canvas 2D Ripple implementation for performance)
        const inkCanvas = document.getElementById('ink-bg-canvas');
        const inkCtx = inkCanvas.getContext('2d');
        let inkTrails = [];
        
        function resizeInkCanvas() {
            inkCanvas.width = deskCanvas.offsetWidth;
            inkCanvas.height = deskCanvas.offsetHeight;
        }
        window.addEventListener('resize', resizeInkCanvas);
        resizeInkCanvas();

        deskCanvas.addEventListener('mousemove', (e) => {
            // Adjust coordinates relative to the panning canvas
            const rect = deskCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            inkTrails.push({ x, y, age: 0, maxAge: 50 + Math.random() * 50 });
        });

        function animateInk() {
            inkCtx.clearRect(0, 0, inkCanvas.width, inkCanvas.height);
            for (let i = inkTrails.length - 1; i >= 0; i--) {
                let p = inkTrails[i];
                p.age++;
                if (p.age > p.maxAge) {
                    inkTrails.splice(i, 1);
                    continue;
                }
                const progress = p.age / p.maxAge;
                const radius = 10 + progress * 50;
                const opacity = 1 - Math.pow(progress, 2);
                
                inkCtx.beginPath();
                inkCtx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                inkCtx.fillStyle = `rgba(54, 49, 45, ${opacity * 0.2})`; // ink-main color
                inkCtx.fill();
            }
            requestAnimationFrame(animateInk);
        }
        animateInk();

        // B. 3D Origami Crane (Three.js)
        const threeContainer = document.getElementById('three-crane');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, threeContainer.offsetWidth / threeContainer.offsetHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(threeContainer.offsetWidth, threeContainer.offsetHeight);
        threeContainer.appendChild(renderer.domElement);

        // Create a stylized geometric bird
        const geometry = new THREE.ConeGeometry(1, 2, 4);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xfbfaf6, 
            roughness: 0.8, 
            flatShading: true 
        });
        const craneMesh = new THREE.Mesh(geometry, material);
        craneMesh.rotation.x = Math.PI / 2;
        scene.add(craneMesh);

        // Add Wings
        const wingGeo = new THREE.BufferGeometry();
        const vertices = new Float32Array([
            0, 0, 0,
            2, 1, -1,
            0, 0, -2,
            
            0, 0, 0,
            0, 0, -2,
            -2, 1, -1
        ]);
        wingGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        wingGeo.computeVertexNormals();
        const wings = new THREE.Mesh(wingGeo, material);
        craneMesh.add(wings);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        const ambientLight = new THREE.AmbientLight(0xb56a5c, 0.5); // Clay tint
        scene.add(ambientLight);

        camera.position.z = 6;

        // Mouse follow rotation
        let targetRotationX = 0;
        let targetRotationY = 0;
        window.addEventListener('mousemove', (e) => {
            targetRotationY = (e.clientX / window.innerWidth) * 2 - 1;
            targetRotationX = (e.clientY / window.innerHeight) * 2 - 1;
        });

        function animateThree() {
            requestAnimationFrame(animateThree);
            craneMesh.rotation.y += 0.01; // Base slow spin
            craneMesh.rotation.z = THREE.MathUtils.lerp(craneMesh.rotation.z, -targetRotationY * 0.5, 0.1);
            craneMesh.rotation.x = THREE.MathUtils.lerp(craneMesh.rotation.x, (Math.PI/2) + targetRotationX * 0.5, 0.1);
            renderer.render(scene, camera);
        }
        animateThree();

        // ==========================================
        // 3. GAMIFIED TRANSITION (Paint to Reveal)
        // ==========================================
        const wipeOverlay = document.getElementById('wipe-overlay');
        const wipeCanvas = document.getElementById('wipe-canvas');
        const wipeCtx = wipeCanvas.getContext('2d');
        const instruction = document.getElementById('wipe-instruction');
        
        let isTransitioning = false;
        let activeTopic = null;
        let wipeProgress = 0;

        function resizeWipeCanvas() {
            wipeCanvas.width = window.innerWidth;
            wipeCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeWipeCanvas);
        resizeWipeCanvas();

        function triggerTransition(topic) {
            if (isTransitioning) return;
            isTransitioning = true;
            activeTopic = topic;
            
            // Show overlay, fill with Ink
            wipeOverlay.style.pointerEvents = 'auto';
            wipeCtx.globalCompositeOperation = 'source-over';
            wipeCtx.fillStyle = '#111111'; // Deep ink
            wipeCtx.fillRect(0, 0, wipeCanvas.width, wipeCanvas.height);
            
            gsap.to(instruction, { opacity: 1, duration: 1, delay: 0.5 });
            
            // Switch to eraser mode
            wipeCtx.globalCompositeOperation = 'destination-out';
            wipeCtx.lineWidth = 150;
            wipeCtx.lineCap = 'round';
            wipeCtx.lineJoin = 'round';
            wipeProgress = 0;

            // Pre-build the article content behind the black screen
            buildArticle(topic);
        }

        let isWiping = false;
        let lastX, lastY;

        wipeOverlay.addEventListener('mousedown', (e) => {
            isWiping = true;
            lastX = e.clientX; lastY = e.clientY;
            gsap.to(instruction, { opacity: 0, duration: 0.3 });
        });
        window.addEventListener('mouseup', () => isWiping = false);

        wipeOverlay.addEventListener('mousemove', (e) => {
            if (!isWiping || !isTransitioning) return;
            
            wipeCtx.beginPath();
            wipeCtx.moveTo(lastX, lastY);
            wipeCtx.lineTo(e.clientX, e.clientY);
            wipeCtx.stroke();
            
            lastX = e.clientX;
            lastY = e.clientY;
            
            wipeProgress++;
            // If user has scrubbed enough, finish transition automatically
            if (wipeProgress > 50) {
                finishTransition();
            }
        });

        // Touch wipe
        wipeOverlay.addEventListener('touchstart', (e) => {
            isWiping = true;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            gsap.to(instruction, { opacity: 0, duration: 0.3 });
        });
        window.addEventListener('touchend', () => isWiping = false);
        wipeOverlay.addEventListener('touchmove', (e) => {
            if (!isWiping || !isTransitioning) return;
            wipeCtx.beginPath();
            wipeCtx.moveTo(lastX, lastY);
            wipeCtx.lineTo(e.touches[0].clientX, e.touches[0].clientY);
            wipeCtx.stroke();
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            wipeProgress++;
            if (wipeProgress > 30) finishTransition(); // Faster on mobile
        });

        function finishTransition() {
            isTransitioning = false;
            wipeOverlay.style.pointerEvents = 'none';
            gsap.to(wipeCanvas, { 
                opacity: 0, 
                duration: 1, 
                onComplete: () => {
                    document.getElementById('desk-viewport').style.display = 'none';
                    wipeCtx.clearRect(0, 0, wipeCanvas.width, wipeCanvas.height);
                    wipeCanvas.style.opacity = 1;
                    initScrollAnimations();
                } 
            });
            
            const articleViewport = document.getElementById('article-viewport');
            articleViewport.style.display = 'block';
            gsap.to(articleViewport, { opacity: 1, duration: 0.5 });
            articleViewport.scrollTop = 0;
        }

        function returnToDesk() {
            // Simple fade back
            const articleViewport = document.getElementById('article-viewport');
            gsap.to(articleViewport, {
                opacity: 0,
                duration: 0.8,
                onComplete: () => {
                    articleViewport.style.display = 'none';
                    document.getElementById('desk-viewport').style.display = 'block';
                    // Kill ScrollTriggers to prevent memory leaks
                    ScrollTrigger.getAll().forEach(t => t.kill());
                }
            })
        }

        // ==========================================
        // 4. SCROLLYTELLING & "MA" IDLE EFFECT
        // ==========================================
        
        function buildArticle(topic) {
            const contentDiv = document.getElementById('article-content');
            contentDiv.innerHTML = '';
            const sections = articleData[topic];
            
            sections.forEach((sec, i) => {
                const html = `
                    <div class="story-section">
                        <div class="story-text ma-effect">
                            <h2>${sec.title}</h2>
                            ${sec.text}
                        </div>
                        <div class="story-visual">
                            ${sec.svg}
                        </div>
                    </div>
                `;
                contentDiv.insertAdjacentHTML('beforeend', html);
            });
        }

        function initScrollAnimations() {
            // Animate SVG paths as they come into view
            const animPaths = document.querySelectorAll('.anim-path');
            animPaths.forEach(path => {
                gsap.to(path, {
                    strokeDashoffset: 0,
                    scrollTrigger: {
                        trigger: path.closest('.story-section'),
                        scroller: "#article-viewport",
                        start: "top center",
                        end: "bottom center",
                        scrub: 1
                    }
                });
            });

            // Sticky Visuals
            const visuals = document.querySelectorAll('.story-visual');
            visuals.forEach(vis => {
                ScrollTrigger.create({
                    trigger: vis.closest('.story-section'),
                    scroller: "#article-viewport",
                    start: "top top",
                    end: "bottom bottom",
                    pin: vis
                });
            });

            // Ink Guide Line down the left
            gsap.fromTo('.guide-path', 
                { strokeDashoffset: 1000 },
                { strokeDashoffset: 0, 
                  scrollTrigger: {
                      trigger: '#article-content',
                      scroller: "#article-viewport",
                      start: "top top",
                      end: "bottom bottom",
                      scrub: true
                  }
                }
            );
        }

        // The "Ma" Effect: Fade UI if idle
        let idleTimer;
        const articleViewport = document.getElementById('article-viewport');
        
        function resetMaEffect() {
            articleViewport.classList.remove('is-idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                // Only trigger if we are inside an article
                if(articleViewport.style.display === 'block') {
                    articleViewport.classList.add('is-idle');
                }
            }, 3000); // 3 seconds of stillness
        }

        window.addEventListener('mousemove', resetMaEffect);
        window.addEventListener('touchmove', resetMaEffect);
        articleViewport.addEventListener('scroll', resetMaEffect);
        
        resetMaEffect(); // Init timer

    </script>
</body>
</html>
