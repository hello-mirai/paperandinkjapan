<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper & Ink: Japan | Discovery</title>
    <meta name="description" content="Discover the history, art, and philosophy of Japanese Shodo, Origami, and Zen aesthetics.">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Bodoni+Moda:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        /* Multi-Color Wabi-Sabi Palette */
        :root {
            /* Backgrounds */
            --bg-washi: #f2eee5;     /* Warm, aged paper background */
            --bg-card: #fbfaf6;      /* Slightly brighter paper for cards */
            --border-earth: #d6cfc3; /* Soft, natural dividing lines */
            
            /* Typography */
            --ink-main: #36312d;     /* Deep, warm brownish-charcoal */
            --ink-muted: #7a7269;    /* Softer, faded brown-grey */
            
            /* Accents */
            --accent-matcha: #6b7a60; /* Earthy green for primary focus */
            --accent-clay: #b56a5c;   /* Terracotta red for secondary interactions */
            --matcha-tint: rgba(107, 122, 96, 0.15);
            --clay-tint: rgba(181, 106, 92, 0.12);
            
            /* Shadows */
            --earth-shadow: rgba(54, 49, 45, 0.06);
            --hover-shadow: rgba(107, 122, 96, 0.15);
        }

        body {
            background-color: var(--bg-washi);
            color: var(--ink-main);
            font-family: 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Subtle Washi Paper Grain Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        .font-serif {
            font-family: 'Bodoni Moda', serif;
        }

        /* Window Card Styles */
        .window-card {
            background: var(--bg-card);
            border: 1px solid var(--border-earth);
            border-radius: 4px;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 12px var(--earth-shadow);
        }

        .window-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid transparent;
            border-radius: 4px;
            transition: border-color 0.5s ease;
            pointer-events: none;
        }

        .window-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px var(--hover-shadow);
        }

        .window-card:hover::after {
            border-color: var(--accent-matcha);
        }

        .window-image-container {
            width: 100%;
            height: 60%;
            background: var(--bg-washi);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-earth);
            overflow: hidden;
            transition: all 0.5s ease;
            color: var(--ink-main); /* Base color for SVG strokes */
        }

        /* Dual-tone hover effect */
        .window-card:hover .window-image-container {
            color: var(--accent-clay); /* Changes the stroke color of the SVGs dynamically */
            background: var(--bg-card);
            border-bottom-color: var(--accent-matcha);
        }

        .window-image-container svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .window-card:hover .window-image-container svg {
            transform: scale(1.03);
        }

        /* Content Article Styles */
        .article-content {
            background: var(--bg-card);
            border: 1px solid var(--border-earth);
            border-radius: 4px;
            box-shadow: 0 10px 30px var(--earth-shadow);
            position: relative;
        }

        .article-content p {
            margin-bottom: 1.75rem;
            line-height: 1.9;
            color: var(--ink-muted);
            font-size: 1.05rem;
        }
        
        .article-content strong {
            color: var(--ink-main);
            font-weight: 500;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-washi); }
        ::-webkit-scrollbar-thumb { background: var(--border-earth); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-matcha); }

        /* Navigation Button Hover */
        .nav-btn {
            position: relative;
            color: var(--ink-muted);
        }
        .nav-btn::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--accent-matcha);
            transition: width 0.3s ease;
        }
        .nav-btn:hover {
            color: var(--accent-matcha);
        }
        .nav-btn:hover::after {
            width: 100%;
        }

        /* Accent elements */
        .hanko-stamp {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--accent-clay);
            border-radius: 50%;
            margin-left: 12px;
            transform: translateY(-2px);
        }
        
        .header-bg {
            background-color: rgba(242, 238, 229, 0.85); /* Washi with opacity */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

            <div class="text-2xl font-serif font-black tracking-tighter uppercase cursor-pointer flex items-center text-[var(--ink-main)]" onclick="goHome()">

            <div id="nav-controls" class="hidden opacity-0">

                                <p>The Japanese concept of <strong>Ma (間)</strong> translates to "gap," "space," "pause," or "interval." Etymologically, the ancient Chinese character originally combined the radical for "door" with "moon," depicting the poetic image of moonlight peeping through the crevice of a doorway.</p>

                                <p>In architecture and spatial design, traditional homes feature an <em>engawa</em> (a peaceful transitional space between indoors and outdoors) and the <em>tokonoma</em>, a dedicated alcove used simply to display a single hanging scroll or a solitary flower arrangement. By leaving the rest of the room bare, <em>Ma</em> enhances depth perception and makes limited areas feel expansive and calming.</p>

                                <p>The term is a synthesis of two ideas. <strong>Wabi (侘)</strong> represents the appreciation of simplicity, humility, and the quiet elegance of the unadorned—like choosing a modest, handcrafted ceramic bowl over a flawless, mass-produced factory item. <strong>Sabi (寂)</strong> refers to the "beauty of age." It honors the patina that develops over years of use: the fading of wood, the tarnish of rust, or the subtle crackle in a glaze.</p>

        // --------------------------------------------------------
        // STATE MANAGEMENT & RENDERING LOGIC
        // --------------------------------------------------------
        let navigationStack = [discoveryData]; 

        const container = document.getElementById('view-container');
        const headerTitle = document.getElementById('view-title');
        const headerSubtitle = document.getElementById('view-subtitle');
        const navControls = document.getElementById('nav-controls');

        function init() {
            renderCurrentState();
        }

        function renderCurrentState() {
            const currentNode = navigationStack[navigationStack.length - 1];
            
            // Update Header Texts
            headerTitle.textContent = currentNode.title;
            headerSubtitle.textContent = currentNode.subtitle || '';

            // Update Navigation Controls (Back Button)
            if (navigationStack.length > 1) {
                gsap.to(navControls, { display: 'block', opacity: 1, duration: 0.3 });
            } else {
                gsap.to(navControls, { opacity: 0, duration: 0.3, onComplete: () => navControls.style.display = 'none' });
            }

            // Clear Container
            container.innerHTML = '';

            // Determine what to render (Children Windows OR Final Content)
            if (currentNode.children) {
                renderWindows(currentNode.children);
            } else if (currentNode.content) {
                renderArticle(currentNode);
            }
        }

        function renderWindows(children) {
            const grid = document.createElement('div');
            const colClass = children.length === 2 ? 'md:grid-cols-2 max-w-4xl' : 'md:grid-cols-3';
            grid.className = `grid grid-cols-1 ${colClass} gap-8 mx-auto pb-12`;

            children.forEach((child, index) => {
                const card = document.createElement('div');
                card.className = `window-card h-96 flex flex-col items-center text-center`;
                card.onclick = () => navigateTo(child);

                card.innerHTML = `
                    <div class="window-image-container">
                        ${child.image || ''}
                    </div>
                    <div class="p-8 flex flex-col justify-center flex-grow">
                        <h3 class="font-serif text-2xl font-bold text-[var(--ink-main)] mb-2">${child.title}</h3>
                        ${child.subtitle ? `<p class="font-sans text-sm text-[var(--ink-muted)] tracking-wide">${child.subtitle}</p>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });

            container.appendChild(grid);

            // Animate Cards In
            gsap.fromTo(grid.children, 
                { y: 40, opacity: 0 }, 
                { y: 0, opacity: 1, duration: 0.8, stagger: 0.15, ease: "power3.out", clearProps: "all" }
            );
        }

        function renderArticle(node) {
            const article = document.createElement('article');
            article.className = 'article-content p-12 md:p-20 max-w-4xl mx-auto mb-12';
            
            // Add sketchy image to top of article
            const imgDiv = document.createElement('div');
            imgDiv.className = 'w-full h-64 md:h-80 mx-auto mb-14 flex items-center justify-center bg-[var(--matcha-tint)] overflow-hidden rounded border border-[var(--border-earth)]';
            // Force the primary stroke color to Matcha for the article headers
            imgDiv.style.color = 'var(--accent-matcha)';
            imgDiv.innerHTML = node.image || '';
            
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = `<div class="w-12 h-[3px] bg-[var(--accent-clay)] mb-8"></div>` + node.content;

            article.appendChild(imgDiv);
            article.appendChild(contentDiv);
            container.appendChild(article);

            // Animate Article In
            gsap.fromTo(article,
                { y: 30, opacity: 0 },
                { y: 0, opacity: 1, duration: 1, ease: "power2.out" }
            );
        }

        // --------------------------------------------------------
        // INTERACTION
        // --------------------------------------------------------
        function navigateTo(node) {
            gsap.to(container, {
                opacity: 0, 
                y: -20,
                duration: 0.3, 
                onComplete: () => {
                    navigationStack.push(node);
                    renderCurrentState();
                    gsap.set(container, { opacity: 1, y: 0 });
                }
            });
        }

        function goBack() {
            if (navigationStack.length > 1) {
                gsap.to(container, {
                    opacity: 0, 
                    y: 20,
                    duration: 0.3, 
                    onComplete: () => {
                        navigationStack.pop();
                        renderCurrentState();
                        gsap.set(container, { opacity: 1, y: 0 });
                    }
                });
            }
        }

        function goHome() {
            if (navigationStack.length > 1) {
                gsap.to(container, {
                    opacity: 0,
                    duration: 0.3,
                    onComplete: () => {
                        navigationStack = [discoveryData];
                        renderCurrentState();
                        gsap.set(container, { opacity: 1, y: 0 });
                    }
                });
            }
        }

        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
