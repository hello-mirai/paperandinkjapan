<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper & Ink: Japan | Discovery</title>
    <meta name="description" content="Discover the history, art, and philosophy of Japanese Shodo and Origami.">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Bodoni+Moda:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-light: #fafafa;
            --pure-white: #ffffff;
            --ink-black: #111111;
            --ink-gray: #555555;
            --border-light: #e5e5e5;
            --imperial-red: #bc002d;
            --red-tint: rgba(188, 0, 45, 0.03);
        }

        body {
            background-color: var(--bg-light);
            color: var(--ink-black);
            font-family: 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-serif {
            font-family: 'Bodoni Moda', serif;
        }

        /* Window Card Styles */
        .window-card {
            background: var(--pure-white);
            border: 1px solid var(--border-light);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .window-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid transparent;
            transition: border-color 0.4s ease;
        }

        .window-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(188,0,45,0.06);
        }

        .window-card:hover::after {
            border-color: var(--imperial-red);
        }

        .window-image-container {
            width: 100%;
            height: 60%;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-light);
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .window-card:hover .window-image-container {
            color: var(--imperial-red);
            background: var(--red-tint);
            border-bottom-color: var(--imperial-red);
        }

        .window-image-container svg, .window-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transition: transform 0.6s ease;
        }

        .window-card:hover .window-image-container svg, .window-card:hover .window-image-container img {
            transform: scale(1.05);
        }

        /* Content Article Styles */
        .article-content p {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            color: var(--ink-gray);
        }
        
        .article-content strong {
            color: var(--ink-black);
            font-weight: 500;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-light); }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ink-black); }

        /* Navigation Button Hover */
        .nav-btn {
            position: relative;
        }
        .nav-btn::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--imperial-red);
            transition: width 0.3s ease;
        }
        .nav-btn:hover {
            color: var(--imperial-red);
        }
        .nav-btn:hover::after {
            width: 100%;
        }

        /* Accent elements */
        .hanko-stamp {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--imperial-red);
            border-radius: 50%;
            margin-left: 10px;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header / Branding -->
    <header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-[var(--border-light)] transition-all duration-300 h-20 flex items-center">
        <div class="container mx-auto px-8 w-full flex justify-between items-center">
            <!-- Logo -->
            <div class="text-2xl font-serif font-black tracking-tighter uppercase cursor-pointer flex items-center" onclick="goHome()">
                Paper & Ink Japan <span class="hanko-stamp"></span>
            </div>
            
            <!-- Dynamic Navigation Controls -->
            <div id="nav-controls" class="hidden opacity-0">
                <button onclick="goBack()" class="nav-btn text-sm uppercase tracking-widest font-sans text-[var(--ink-gray)] transition-colors flex items-center gap-2">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back
                </button>
            </div>
        </div>
    </header>

    <!-- Main Discovery Area -->
    <main class="flex-grow pt-32 pb-24 px-8 flex flex-col items-center justify-center min-h-screen" id="main-container">
        
        <!-- Header Text (Dynamic) -->
        <div id="discovery-header" class="text-center mb-16 max-w-2xl mx-auto flex flex-col items-center">
            <div class="w-8 h-1 bg-[var(--imperial-red)] mb-8"></div>
            <h1 class="text-5xl md:text-6xl font-serif font-bold mb-6 tracking-tight" id="view-title">Discover</h1>
            <p class="text-lg font-sans font-light text-[var(--ink-gray)]" id="view-subtitle">Select a window to begin your journey through Japanese artistry and philosophy.</p>
        </div>

        <!-- Dynamic Content Injector -->
        <div id="view-container" class="w-full max-w-6xl mx-auto">
            <!-- Windows or Article will be injected here -->
        </div>

    </main>

    <footer class="py-8 border-t border-[var(--border-light)] bg-white text-center">
        <p class="text-xs font-sans uppercase tracking-widest text-[var(--ink-gray)]">&copy; 2026 Paper & Ink: Japan. Curated Discovery.</p>
    </footer>

    <script>
        // --------------------------------------------------------
        // STATIC VECTOR ARTWORK (Replaces dynamic API for performance & GitHub Pages hosting)
        // --------------------------------------------------------
        const SVG_BRUSH = `<svg viewBox="0 0 200 200" class="w-full h-full p-8" fill="none" stroke="currentColor" stroke-width="0.75" vector-effect="non-scaling-stroke"><path d="M100 40 A 60 60 0 1 1 40 100 A 60 60 0 0 1 90 42" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="300" stroke-dashoffset="20"/><line x1="140" y1="20" x2="110" y2="100" stroke-width="1.5"/><path d="M110 100 C100 120, 115 130, 105 140 C100 130, 105 110, 110 100" fill="currentColor"/></svg>`;
        
        const SVG_CRANE = `<svg viewBox="0 0 200 200" class="w-full h-full p-8" fill="none" stroke="currentColor" stroke-width="0.75" stroke-linejoin="round" vector-effect="non-scaling-stroke"><polygon points="100,60 140,100 100,140 60,100"/><polygon points="100,60 120,80 100,100"/><polygon points="60,100 80,120 100,100"/><polyline points="100,60 110,30 95,40 100,60"/><polyline points="100,140 130,170 140,150 100,140"/><line x1="60" y1="100" x2="30" y2="70"/><line x1="30" y1="70" x2="100" y2="80"/><line x1="140" y1="100" x2="170" y2="70"/><line x1="170" y1="70" x2="100" y2="80"/></svg>`;
        
        const SVG_VOID = `<svg viewBox="0 0 200 200" class="w-full h-full p-8" fill="none" stroke="currentColor" stroke-width="0.5" vector-effect="non-scaling-stroke"><ellipse cx="100" cy="140" rx="50" ry="15"/><ellipse cx="100" cy="115" rx="35" ry="12"/><ellipse cx="100" cy="95" rx="25" ry="10"/><ellipse cx="100" cy="80" rx="15" ry="6"/><path d="M30 140 Q 100 180 170 140" stroke-dasharray="2 4"/><path d="M10 140 Q 100 210 190 140" stroke-dasharray="2 4"/></svg>`;
        
        const SVG_HISTORY = `<svg viewBox="0 0 200 200" class="w-full h-full p-8" fill="none" stroke="currentColor" stroke-width="1" vector-effect="non-scaling-stroke"><circle cx="100" cy="100" r="45" stroke-width="0.5" stroke-dasharray="2 4"/><rect x="50" y="60" width="100" height="8" fill="currentColor"/><rect x="60" y="75" width="80" height="4" fill="currentColor"/><rect x="65" y="68" width="6" height="80"/><rect x="129" y="68" width="6" height="80"/></svg>`;
        
        const SVG_TOOLS = `<svg viewBox="0 0 200 200" class="w-full h-full p-8" fill="none" stroke="currentColor" stroke-width="1" vector-effect="non-scaling-stroke"><rect x="40" y="40" width="80" height="120" stroke-width="0.5"/><line x1="60" y1="60" x2="60" y2="140" stroke-width="0.5" stroke-dasharray="2 2"/><rect x="130" y="100" width="40" height="60" rx="5"/><circle cx="150" cy="120" r="10"/><rect x="140" y="50" width="12" height="40" fill="currentColor"/></svg>`;
        
        const SVG_SPACE = `<svg viewBox="0 0 200 200" class="w-full h-full p-8" fill="none" stroke="currentColor" stroke-width="0.75" vector-effect="non-scaling-stroke"><g transform="translate(100,100)"><polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"/><polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10"/><line x1="0" y1="-60" x2="0" y2="-20"/><line x1="52" y1="-30" x2="17" y2="-10"/><line x1="52" y1="30" x2="17" y2="10"/><line x1="0" y1="60" x2="0" y2="20"/><line x1="-52" y1="30" x2="-17" y2="10"/><line x1="-52" y1="-30" x2="-17" y2="-10"/></g></svg>`;
        
        const SVG_MIND = `<svg viewBox="0 0 200 200" class="w-full h-full p-8" fill="none" stroke="currentColor" stroke-width="0.75" vector-effect="non-scaling-stroke"><path d="M100 160 C100 160, 40 110, 100 50 C160 110, 100 160, 100 160 Z"/><path d="M100 160 C100 160, 10 100, 70 40 C120 90, 100 160, 100 160 Z"/><path d="M100 160 C100 160, 190 100, 130 40 C80 90, 100 160, 100 160 Z"/></svg>`;

        const discoveryData = {
            id: 'root',
            title: 'Discover',
            subtitle: 'Select a window to begin your journey through Japanese artistry and philosophy.',
            children: [
                {
                    id: 'philosophy',
                    title: 'Philosophy',
                    subtitle: 'The Void and the Imperfect',
                    image: SVG_VOID,
                    children: [
                        {
                            id: 'phil-ma',
                            title: 'Ma (間)',
                            subtitle: 'The Beauty of Empty Space',
                            image: SVG_VOID,
                            content: `
                                <h2 class="text-3xl font-serif font-bold mb-6">The Power of the Pause</h2>
                                <p>In many cultures, people try to fill up every empty space they see. But in Japan, there is a powerful concept called <strong>Ma</strong>, which translates to "negative space" or "pause."</p>
                                <p><em>Ma</em> teaches us that empty space is just as important as the things inside it. Think of the silence between notes in your favorite song—without that silence, the song would just be a wall of noise. In a Japanese painting, the blank white paper is just as beautiful as the dark ink.</p>
                                <p>By leaving things out, <em>Ma</em> creates a sense of simple and clean beauty. It prevents rooms from feeling cluttered and gives our eyes, and our minds, a peaceful place to rest.</p>
                            `
                        },
                        {
                            id: 'phil-wabi',
                            title: 'Wabi-Sabi (侘寂)',
                            subtitle: 'Perfectly Imperfect',
                            image: SVG_BRUSH,
                            content: `
                                <h2 class="text-3xl font-serif font-bold mb-6">Finding Calm in Imperfection</h2>
                                <p>We live in a world that constantly tells us to want things that are brand new, shiny, and flawless. <strong>Wabi-Sabi</strong> is a Japanese philosophy that teaches the exact opposite.</p>
                                <p>It is the practice of finding quiet beauty in things that are old, imperfect, and changing. A great example is a favorite teacup with a small chip in it, a wooden table with scratches from years of family dinners, or a faded, wrinkly autumn leaf resting on the ground.</p>
                                <p>Instead of trying to keep everything perfect, Wabi-Sabi reminds us to relax. It teaches us to accept that nothing lasts forever, nothing is finished, and nothing is perfect—and that is exactly what makes life so beautiful and special.</p>
                            `
                        }
                    ]
                },
                {
                    id: 'shodo',
                    title: 'Shodo',
                    subtitle: 'The Way of the Brush',
                    image: SVG_BRUSH,
                    children: [
                        {
                            id: 'shodo-history',
                            title: 'History & Evolution',
                            subtitle: 'The Story of Shodo',
                            image: SVG_HISTORY,
                            content: `
                                <h2 class="text-3xl font-serif font-bold mb-6">How It All Began</h2>
                                <p>Japanese calligraphy, or <strong>Shodo</strong>, translates to "the way of writing." It started a long time ago when Chinese characters were brought over to Japan in the 6th century. At first, Japanese writers copied the exact, strict styles of the Chinese masters.</p>
                                <p>But over time, the Japanese wanted a style of their own. A famous monk named Kūkai traveled to China, studied deeply, and brought back new ideas. Later on, three legendary Japanese artists—known as the "Three Traces"—softened the rigid lines into a flowing, graceful style called <em>Wayo</em>.</p>
                                <p>Instead of just recording information, writing became a true art form. This created a completely unique Japanese tradition where the brush seems to dance across the paper, capturing the artist's true feelings in every stroke.</p>
                            `
                        },
                        {
                            id: 'shodo-tools',
                            title: 'The Four Treasures',
                            subtitle: 'The Tools of the Master',
                            image: SVG_TOOLS,
                            content: `
                                <h2 class="text-3xl font-serif font-bold mb-6">The Magic of the Tools</h2>
                                <p>To practice Shodo, you need four special tools, beautifully known as the "Four Treasures of the Study." Calligraphers treat these tools with immense respect.</p>
                                <p><strong>1. The Brush (Fude):</strong> Usually made of bamboo and soft animal hair. Because it is so flexible, the artist can easily paint thick, powerful lines or thin, delicate ones.</p>
                                <p><strong>2. The Ink (Sumi):</strong> Traditional ink isn't a liquid in a bottle; it’s a solid black stick made from soot and plant glue.</p>
                                <p><strong>3. The Inkstone (Suzuri):</strong> This is a carved stone dish. Artists pour a little water into the stone and rub the solid ink stick against it to make liquid ink. This slow, quiet rubbing is a peaceful process that helps the artist relax and clear their mind before writing.</p>
                                <p><strong>4. The Paper (Washi):</strong> This special handmade Japanese paper is very thin but incredibly strong. It perfectly captures the energy, speed, and emotion of every single brushstroke.</p>
                            `
                        }
                    ]
                },
                {
                    id: 'origami',
                    title: 'Origami',
                    subtitle: 'The Geometry of the Fold',
                    image: SVG_CRANE,
                    children: [
                        {
                            id: 'origami-legend',
                            title: 'The Paper Crane',
                            subtitle: 'A Global Symbol of Peace',
                            image: SVG_CRANE,
                            content: `
                                <h2 class="text-3xl font-serif font-bold mb-6">The Legend of 1,000 Cranes</h2>
                                <p>In Japanese myths, cranes are magical birds that live for a thousand years and bring good luck. Because of this, the paper crane became the most famous origami shape of all time.</p>
                                <p>There is an old, beautiful legend: if you have the patience to fold 1,000 paper cranes, you will be granted a single wish.</p>
                                <p>This story became famous worldwide because of Sadako Sasaki, a brave 12-year-old girl who became very sick from the atomic bomb dropped on Hiroshima. While resting in the hospital, she folded over 1,000 paper cranes, wishing to be healed. Though she sadly passed away, her story touched the hearts of millions. Today, her paper cranes live on as a powerful, global symbol of hope, healing, and peace.</p>
                            `
                        },
                        {
                            id: 'origami-tech',
                            title: 'Space & Science',
                            subtitle: 'From Paper to Outer Space',
                            image: SVG_SPACE,
                            content: `
                                <h2 class="text-3xl font-serif font-bold mb-6">Origami in the Modern World</h2>
                                <p>Origami isn't just a fun art project; it is actually advanced math! Today, scientists and engineers use origami folding techniques to solve massive real-world problems.</p>
                                <p>For example, NASA needs to send giant solar panels into space to power satellites. The problem is, rockets are relatively small. By using mathematical origami patterns, engineers can fold these huge, flat panels into tiny, tight packages. Once the satellite is floating in space, the panels automatically unfold themselves perfectly.</p>
                                <p>Origami is also saving lives in medicine. Doctors and scientists are creating microscopic origami out of DNA to build tiny delivery systems that can carry medicine directly to sick cells inside the human body.</p>
                            `
                        },
                        {
                            id: 'origami-health',
                            title: 'Therapy & Mind',
                            subtitle: 'Folding for Your Health',
                            image: SVG_MIND,
                            content: `
                                <h2 class="text-3xl font-serif font-bold mb-6">A Workout for the Brain</h2>
                                <p>Did you know that folding paper is highly beneficial for your mental health? Doctors and psychologists have found that origami has amazing therapeutic benefits for people of all ages.</p>
                                <p>For children, following the step-by-step folding instructions builds patience, problem-solving skills, and hand-eye coordination. It acts as a fun way to train their growing brains.</p>
                                <p>For teens and adults, focusing completely on the paper helps melt away stress and anxiety. Because your hands and mind are busy, it acts as a form of meditation that keeps you in the present moment. In Japan, older adults even play origami games to keep their minds sharp and protect their brains against memory loss as they age.</p>
                            `
                        }
                    ]
                }
            ]
        };

        // --------------------------------------------------------
        // STATE MANAGEMENT & RENDERING LOGIC
        // --------------------------------------------------------
        let navigationStack = [discoveryData]; // Array to keep track of where we are

        const container = document.getElementById('view-container');
        const headerTitle = document.getElementById('view-title');
        const headerSubtitle = document.getElementById('view-subtitle');
        const navControls = document.getElementById('nav-controls');

        function init() {
            renderCurrentState();
        }

        function renderCurrentState() {
            const currentNode = navigationStack[navigationStack.length - 1];
            
            // Update Header Texts
            headerTitle.textContent = currentNode.title;
            headerSubtitle.textContent = currentNode.subtitle || '';

            // Update Navigation Controls (Back Button)
            if (navigationStack.length > 1) {
                gsap.to(navControls, { display: 'block', opacity: 1, duration: 0.3 });
            } else {
                gsap.to(navControls, { opacity: 0, duration: 0.3, onComplete: () => navControls.style.display = 'none' });
            }

            // Clear Container
            container.innerHTML = '';

            // Determine what to render (Children Windows OR Final Content)
            if (currentNode.children) {
                renderWindows(currentNode.children);
            } else if (currentNode.content) {
                renderArticle(currentNode);
            }
        }

        function renderWindows(children) {
            // Create Grid
            const grid = document.createElement('div');
            // Adjust columns based on number of items to make it look elegant
            const colClass = children.length === 2 ? 'md:grid-cols-2 max-w-4xl' : 'md:grid-cols-3';
            grid.className = `grid grid-cols-1 ${colClass} gap-8 mx-auto`;

            children.forEach((child, index) => {
                const card = document.createElement('div');
                card.className = 'window-card h-96 flex flex-col items-center text-center';
                card.onclick = () => navigateTo(child);

                card.innerHTML = `
                    <div class="window-image-container text-[var(--ink-black)] bg-[var(--bg-light)]">
                        ${child.image || ''}
                    </div>
                    <div class="p-8 flex flex-col justify-center flex-grow">
                        <h3 class="font-serif text-2xl font-bold text-[var(--ink-black)] mb-2">${child.title}</h3>
                        ${child.subtitle ? `<p class="font-sans text-sm text-[var(--ink-gray)] tracking-wide">${child.subtitle}</p>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });

            container.appendChild(grid);

            // Animate Cards In
            gsap.fromTo(grid.children, 
                { y: 40, opacity: 0 }, 
                { y: 0, opacity: 1, duration: 0.8, stagger: 0.15, ease: "power3.out", clearProps: "all" }
            );
        }

        function renderArticle(node) {
            const article = document.createElement('article');
            article.className = 'article-content bg-white p-12 md:p-20 border border-[var(--border-light)] max-w-4xl mx-auto shadow-sm';
            
            // Add sketchy image to top of article
            const imgDiv = document.createElement('div');
            imgDiv.className = 'w-full h-64 md:h-80 mx-auto mb-12 flex items-center justify-center text-[var(--imperial-red)] bg-[var(--red-tint)] overflow-hidden rounded border border-[var(--border-light)]';
            imgDiv.innerHTML = node.image || '';
            
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = `<div class="w-12 h-1 bg-[var(--imperial-red)] mb-8"></div>` + node.content;

            article.appendChild(imgDiv);
            article.appendChild(contentDiv);
            container.appendChild(article);

            // Animate Article In
            gsap.fromTo(article,
                { y: 30, opacity: 0 },
                { y: 0, opacity: 1, duration: 1, ease: "power2.out" }
            );
        }

        // --------------------------------------------------------
        // INTERACTION
        // --------------------------------------------------------
        function navigateTo(node) {
            // Fade out current content
            gsap.to(container, {
                opacity: 0, 
                y: -20,
                duration: 0.3, 
                onComplete: () => {
                    navigationStack.push(node);
                    renderCurrentState();
                    // Reset container for next animation
                    gsap.set(container, { opacity: 1, y: 0 });
                }
            });
        }

        function goBack() {
            if (navigationStack.length > 1) {
                gsap.to(container, {
                    opacity: 0, 
                    y: 20,
                    duration: 0.3, 
                    onComplete: () => {
                        navigationStack.pop();
                        renderCurrentState();
                        gsap.set(container, { opacity: 1, y: 0 });
                    }
                });
            }
        }

        function goHome() {
            if (navigationStack.length > 1) {
                gsap.to(container, {
                    opacity: 0,
                    duration: 0.3,
                    onComplete: () => {
                        navigationStack = [discoveryData];
                        renderCurrentState();
                        gsap.set(container, { opacity: 1, y: 0 });
                    }
                });
            }
        }

        // Initialize App
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
