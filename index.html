<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-WASHI | Atomic Tradition</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP (Scrollytelling & Tweening) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Three.js (WebGL 3D) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-obsidian: #050505;
            --neon-crimson: #ff0055;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --washi-text: #e0e0e0;
            --washi-muted: #808080;
            
            /* Original content support */
            --matcha-tint: rgba(107, 122, 96, 0.2);
            --clay-tint: rgba(181, 106, 92, 0.2);
            --accent-clay: #ff0055;
            --accent-matcha: #00f2ff;
            --bg-card: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-obsidian);
            color: var(--washi-text);
            font-family: 'Space Grotesk', sans-serif;
            cursor: crosshair;
        }

        .font-jp { font-family: 'Noto Serif JP', serif; }

        /* Washi Grain Overlay */
        #washi-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: overlay;
        }

        /* Scanline Effect */
        #scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 9998;
        }

        /* --- 1. SPATIAL VOID --- */
        #void-viewport {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10;
        }

        #void-canvas-3d {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Artifact Labels - Prominence Increased by ~20% */
        .artifact-label {
            position: absolute;
            padding: 1.2rem; /* Increased padding */
            border-left: 3px solid var(--neon-crimson); /* Bolder border */
            background: rgba(255, 0, 85, 0.08);
            backdrop-filter: blur(8px);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 200px; /* Increased width */
            transform: translate(-50%, -50%);
        }
        .artifact-label:hover {
            background: rgba(255, 0, 85, 0.2);
            border-left-width: 6px;
            padding-left: 1.8rem;
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: -15px 0 40px rgba(255, 0, 85, 0.3);
        }

        /* Text prominence */
        .artifact-label .text-xl { font-size: 1.4rem; letter-spacing: 0.15em; }
        .artifact-label .text-xs { font-size: 0.75rem; }

        @media (max-width: 768px) {
            .artifact-label {
                padding: 0.8rem;
                min-width: 160px;
            }
            .artifact-label .text-xl { font-size: 1rem; }
            .artifact-label .text-xs { font-size: 0.6rem; }
            
            /* 70% Width Rule for Mobile Text */
            .story-content { 
                width: 70% !important; 
                margin: 0 auto 3rem !important;
                text-align: center;
            }
            .story-section { 
                flex-direction: column; 
                padding: 10vh 0; 
                align-items: center;
            }
            .story-visual-container { 
                width: 100%; 
                height: 35vh;
                position: relative;
                top: 0;
            }
        }

        /* --- 2. GLITCH TRANSITION --- */
        #glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-obsidian);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- 3. SCROLLYTELLING ARTICLE --- */
        #article-viewport {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow-y: auto; overflow-x: hidden;
            z-index: 40;
            background: var(--bg-obsidian);
            display: none;
            opacity: 0;
        }

        .story-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-around; /* Better desktop spacing */
            padding: 0 10vw;
            position: relative;
            gap: 5vw; /* Grid-like gap */
        }

        .story-content {
            width: 40%;
            z-index: 2;
        }

        .story-visual-container {
            width: 40%;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 10vh;
        }

        .cyber-btn {
            position: fixed;
            top: 2rem; right: 2rem;
            z-index: 60;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 1rem 2rem;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            transition: all 0.3s;
        }
        .cyber-btn:hover { background: var(--neon-cyan); color: var(--bg-obsidian); }

        #scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 6px;
            background: linear-gradient(90deg, var(--neon-crimson), var(--neon-cyan));
            z-index: 70;
        }

        h2 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 2rem; color: var(--neon-cyan); }
        p { font-size: clamp(1rem, 1.2vw, 1.3rem); line-height: 1.8; color: var(--washi-muted); margin-bottom: 2rem; }
    </style>
</head>
<body>

    <div id="washi-overlay"></div>
    <div id="scanlines"></div>
    <div id="scroll-progress"></div>

    <!-- 1. SPATIAL VOID (ATOMIC TOPICS) -->
    <div id="void-viewport">
        <canvas id="void-canvas-3d"></canvas>
        
        <!-- Individual Topic Labels -->
        <div class="artifact-label" id="label-wabisabi" onclick="triggerGlitch('wabisabi')">
            <span class="text-xs opacity-50 font-mono">01_AESTHETIC</span>
            <span class="text-xl font-jp uppercase tracking-widest">WABI-SABI</span>
        </div>

        <div class="artifact-label" id="label-kintsugi" onclick="triggerGlitch('kintsugi')">
            <span class="text-xs opacity-50 font-mono">02_REPAIR</span>
            <span class="text-xl font-jp uppercase tracking-widest">KINTSUGI</span>
        </div>

        <div class="artifact-label" id="label-shodo" onclick="triggerGlitch('shodo')">
            <span class="text-xs opacity-50 font-mono">03_BRUSH</span>
            <span class="text-xl font-jp uppercase tracking-widest">SHODO</span>
        </div>

        <div class="artifact-label" id="label-ukiyoe" onclick="triggerGlitch('ukiyoe')">
            <span class="text-xs opacity-50 font-mono">04_MEDIA</span>
            <span class="text-xl font-jp uppercase tracking-widest">UKIYO-E</span>
        </div>

        <div class="artifact-label" id="label-origami" onclick="triggerGlitch('origami')">
            <span class="text-xs opacity-50 font-mono">05_FOLD</span>
            <span class="text-xl font-jp uppercase tracking-widest">ORIGAMI</span>
        </div>

        <div class="artifact-label" id="label-kumiki" onclick="triggerGlitch('kumiki')">
            <span class="text-xs opacity-50 font-mono">06_LOCK</span>
            <span class="text-xl font-jp uppercase tracking-widest">KUMIKI</span>
        </div>

        <div class="artifact-label" id="label-ma" onclick="triggerGlitch('ma')">
            <span class="text-xs opacity-50 font-mono">07_VOID</span>
            <span class="text-xl font-jp uppercase tracking-widest">MA</span>
        </div>

        <div class="artifact-label" id="label-hanko" onclick="triggerGlitch('hanko')">
            <span class="text-xs opacity-50 font-mono">08_MARK</span>
            <span class="text-xl font-jp uppercase tracking-widest">HANKO</span>
        </div>
    </div>

    <!-- 2. GLITCH TRANSITION -->
    <div id="glitch-overlay">
        <div class="glitch-text" id="glitch-title">DECRYPTING...</div>
    </div>

    <!-- 3. SCROLLYTELLING ARTICLE -->
    <div id="article-viewport">
        <button class="cyber-btn" onclick="returnToVoid()">[ RETURN_TO_VOID ]</button>
        <div id="article-content"></div>
    </div>

    <div id="cursor-glow" class="fixed w-24 h-24 rounded-full pointer-events-none z-[10000] opacity-30" 
         style="background: radial-gradient(circle, var(--neon-cyan) 0%, transparent 70%);"></div>

    <script src="app.js"></script>
</body>
</html>
