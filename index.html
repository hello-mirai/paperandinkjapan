<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-WASHI | The Neon Tradition</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP (Scrollytelling & Tweening) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Three.js (WebGL 3D) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-obsidian: #050505;
            --neon-crimson: #ff0055;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --washi-text: #e0e0e0;
            --washi-muted: #808080;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-obsidian);
            color: var(--washi-text);
            font-family: 'Space Grotesk', sans-serif;
            cursor: crosshair;
        }

        .font-jp { font-family: 'Noto Serif JP', serif; }

        /* Washi Grain Overlay */
        #washi-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: overlay;
        }

        /* Scanline Effect */
        #scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 9998;
        }

        /* --- 1. SPATIAL VOID (Overworld) --- */
        #void-viewport {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10;
        }

        #void-canvas-3d {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        .hud-element {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.7rem;
            color: var(--neon-cyan);
            opacity: 0.6;
        }

        /* Artifact Overlays */
        .artifact-label {
            position: absolute;
            padding: 1rem;
            border-left: 2px solid var(--neon-crimson);
            background: rgba(255, 0, 85, 0.05);
            backdrop-filter: blur(5px);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .artifact-label:hover {
            background: rgba(255, 0, 85, 0.15);
            border-left-width: 5px;
            padding-left: 1.5rem;
            transform: translateX(10px);
            box-shadow: -10px 0 30px rgba(255, 0, 85, 0.2);
        }

        /* --- 2. GLITCH TRANSITION --- */
        #glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-obsidian);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        .glitch-text {
            font-size: 5rem;
            font-weight: 900;
            color: white;
            position: relative;
            text-shadow: 2px 0 var(--neon-crimson), -2px 0 var(--neon-cyan);
        }

        /* --- 3. SCROLLYTELLING ARTICLE --- */
        #article-viewport {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow-y: auto; overflow-x: hidden;
            z-index: 40;
            background: var(--bg-obsidian);
            display: none;
            opacity: 0;
        }

        .story-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10vw;
            position: relative;
        }

        .story-content {
            width: 45%;
            z-index: 2;
        }

        .story-visual-container {
            width: 50%;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 10vh;
        }

        .neon-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            filter: drop-shadow(0 0 8px var(--neon-cyan));
        }

        /* Close Button */
        .cyber-btn {
            position: fixed;
            top: 2rem; right: 2rem;
            z-index: 60;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 0.8rem 1.5rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            overflow: hidden;
        }
        .cyber-btn::before {
            content: '';
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--neon-cyan);
            transition: 0.3s;
            z-index: -1;
        }
        .cyber-btn:hover { color: var(--bg-obsidian); }
        .cyber-btn:hover::before { left: 0; }

        /* Scroll Progress */
        #scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 4px;
            background: linear-gradient(90deg, var(--neon-crimson), var(--neon-cyan));
            z-index: 70;
        }

        h1 { font-size: 5rem; line-height: 0.9; margin-bottom: 2rem; color: #fff; }
        h2 { font-size: 3rem; margin-bottom: 1.5rem; color: var(--neon-cyan); }
        p { font-size: 1.2rem; line-height: 1.8; color: var(--washi-muted); margin-bottom: 1.5rem; }
        strong { color: var(--neon-crimson); }

        /* Interactive Grid */
        #grid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-200px);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Overlays -->
    <div id="washi-overlay"></div>
    <div id="scanlines"></div>
    <div id="scroll-progress"></div>

    <!-- 1. SPATIAL VOID -->
    <div id="void-viewport">
        <canvas id="void-canvas-3d"></canvas>
        <div id="grid-bg"></div>

        <!-- HUD Elements -->
        <div class="hud-element top-10 left-10">SYSTEM_ONLINE // PROTOCOL_ZEN</div>
        <div class="hud-element top-10 right-10">LOC: [35.6762° N, 139.6503° E]</div>
        <div class="hud-element bottom-10 left-10">PAPER & INK // VERSION_2.0</div>
        
        <!-- Artifact Labels -->
        <div class="artifact-label" id="label-philosophy" onclick="triggerGlitch('philosophy')">
            <span class="text-xs opacity-50 font-mono">01_CONCEPT</span>
            <span class="text-xl font-jp uppercase tracking-widest">MA & WABI-SABI</span>
        </div>

        <div class="artifact-label" id="label-origami" onclick="triggerGlitch('origami')">
            <span class="text-xs opacity-50 font-mono">02_GEOMETRY</span>
            <span class="text-xl font-jp uppercase tracking-widest">ORIGAMI</span>
        </div>

        <div class="artifact-label" id="label-shodo" onclick="triggerGlitch('shodo')">
            <span class="text-xs opacity-50 font-mono">03_INK</span>
            <span class="text-xl font-jp uppercase tracking-widest">SHODO</span>
        </div>
    </div>

    <!-- 2. GLITCH TRANSITION -->
    <div id="glitch-overlay">
        <div class="glitch-text" id="glitch-title">LOADING...</div>
        <div class="mt-4 font-mono text-xs tracking-[1em] text-[var(--neon-cyan)]">INITIALIZING_DATA_STREAM</div>
    </div>

    <!-- 3. SCROLLYTELLING ARTICLE -->
    <div id="article-viewport">
        <button class="cyber-btn" onclick="returnToVoid()">
            [ ESCAPE_TO_VOID ]
        </button>
        
        <div id="article-content" class="relative">
            <!-- Content Injected via JS -->
        </div>
    </div>

    <!-- Interaction Cursor -->
    <div id="cursor-glow" class="fixed w-20 h-20 rounded-full pointer-events-none z-[10000] opacity-30" 
         style="background: radial-gradient(circle, var(--neon-cyan) 0%, transparent 70%); transition: transform 0.1s ease-out;"></div>

    <script src="app.js"></script>
</body>
</html>
